site_name: My VDocs

theme:
  name: material
  palette:
    # Palette pour le mode clair
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    # Palette pour le mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - codehilite
  - fenced_code
  - tables
  - admonition
  - footnotes
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Accueil: material/home
    - index.md

  - Notice: material/book-open-variant
    - DHCP: material/network
      - Installation et config de base: material/tools: Notice/DHCP/DHCP_base.md
      - Config VLAN: material/vlan: Notice/DHCP/DHCP_vlan.md
    - NFS / SAMBA: material/folder-network
      - NFS: material/nas: Notice/NFS_SAMBA/nfs.md
      - SAMBA: material/microsoft-windows: Notice/NFS_SAMBA/samba.md
    - APACHE: material/apache: Notice/apache.md
    - Proxy Squid: material/server-network: Notice/proxysquid.md
    - AD: material/microsoft
      - Installation et config de base: material/server-plus: Notice/Active Directory/AD_base.md
      - Users et Groupe: material/account-group: Notice/Active Directory/AD_users.md
      - GPO: material/tune: Notice/Active Directory/AD_GPO.md

  - Guide: material/book-open-page-variant
    - Commande Switch/Routeur Cisco: material/cisco: Guide/commande_de_base_cisco.md
    - Commande Switch Alcatel: material/router: Guide/commandes_alcatel.md
