site_name: My VDocs
site_description: Documentation technique — DHCP, NFS, AD, Cisco, et plus
site_author: Admin Réseau

theme:
  name: material
  language: fr
  palette:
    - scheme: nord
      primary: deep blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passer en mode clair
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passer en mode sombre
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - codehilite
  - fenced_code
  - footnotes
  - tables
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: cisco
          class: cisco
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: yaml
          class: yaml
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: bash
          class: bash
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

repo_url: https://github.com/LogoViktor/My-VDocs.git

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang:
        - fr
        - en
  - git-revision-date-localized:
      type: custom
      locale: fr
      timezone: Europe/Paris
      fallback_to_build_date: false
      custom_format: "%d/%m/%Y"

nav:
  - Accueil: index.md
  - Notice:
      - DHCP:
          - Installation et configuration de base: Notice/DHCP/DHCP_base.md
          - Configuration VLAN: Notice/DHCP/DHCP_vlan.md
      - OSPF:
          - OSPF: Notice/OSPF/ospf.md
          - OSPFv3: Notice/OSPF/ospfv3.md
      - NFS / SAMBA:
          - NFS: Notice/NFS_SAMBA/nfs.md
          - SAMBA: Notice/NFS_SAMBA/samba.md
      - Apache: Notice/apache.md
      - Proxy Squid: Notice/proxysquid.md
      - Active Directory:
          - Installation et configuration de base: Notice/Active Directory/AD_base.md
          - Utilisateurs et Groupes: Notice/Active Directory/AD_users.md
          - GPO: Notice/Active Directory/AD_GPO.md
      - BGP :
  - Guide:
      - Commandes Switch/Routeur Cisco: Guide/commande_de_base_cisco.md
      - Commandes Switch Alcatel: Guide/commandes_alcatel.md
      - Git / Github: Guide/git_github.md
  - TryHackMe:
      - AD : Énumération de base :